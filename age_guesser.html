<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Age Wizard</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0533 0%, #0d1b2a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 1s ease;
        }

        /* ===== STARFIELD ===== */
        #starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: starTwinkle ease-in-out infinite;
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.6); }
            50%       { opacity: 1;   transform: scale(1.1); }
        }

        /* ===== FLOATING BUBBLES ===== */
        #floatingShapes {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .fshape {
            position: absolute;
            bottom: -120px;
            border-radius: 50%;
            animation: shapeFloat linear infinite;
            opacity: 0;
        }

        @keyframes shapeFloat {
            0%   { opacity: 0;    transform: translateY(0)      rotate(0deg)   scale(0.5); }
            10%  { opacity: 0.45; }
            90%  { opacity: 0.35; }
            100% { opacity: 0;    transform: translateY(-110vh) rotate(720deg) scale(1.2); }
        }

        /* ===== MAIN CARD ===== */
        #gameCard {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 36px;
            padding: 40px 42px 46px;
            max-width: 540px;
            width: 92%;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255,255,255,0.15);
            text-align: center;
        }

        /* ===== SCREENS ===== */
        .screen { display: none; }
        .screen.active {
            display: block;
            animation: screenIn 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes screenIn {
            from { opacity: 0; transform: translateY(16px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }

        /* ===== WELCOME ===== */
        .wizard-orb {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            background: conic-gradient(#6c63ff, #fd79a8, #ff9f43, #4ecdc4, #6c63ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 40px rgba(108, 99, 255, 0.55);
            animation: orbPulse 3s ease-in-out infinite;
            position: relative;
        }

        .wizard-orb::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(#6c63ff, #fd79a8, #ff9f43, #4ecdc4, #6c63ff);
            filter: blur(14px);
            opacity: 0.55;
            z-index: -1;
        }

        .wizard-orb-inner {
            width: 82px;
            height: 82px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes orbPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            33%       { transform: scale(1.07) rotate(5deg); }
            66%       { transform: scale(0.96) rotate(-4deg); }
        }

        .star-shape {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #6c63ff, #fd79a8);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        .main-title {
            font-family: 'Fredoka One', cursive;
            font-size: 3rem;
            line-height: 1.05;
            background: linear-gradient(135deg, #6c63ff 0%, #e84393 45%, #ff9f43 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 13px;
        }

        .main-subtitle {
            font-size: 1.1rem;
            color: #666;
            font-weight: 700;
            margin-bottom: 32px;
            line-height: 1.65;
        }

        .main-subtitle strong { color: #6c63ff; }

        .btn-start {
            background: linear-gradient(135deg, #6c63ff, #a29bfe);
            color: white;
            border: none;
            padding: 19px 56px;
            font-size: 1.5rem;
            font-family: 'Fredoka One', cursive;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 28px rgba(108, 99, 255, 0.5);
            transition: all 0.22s ease;
            letter-spacing: 1px;
        }

        .btn-start:hover  { transform: translateY(-5px) scale(1.02); box-shadow: 0 16px 40px rgba(108,99,255,0.6); }
        .btn-start:active { transform: translateY(0) scale(0.98); }

        /* ===== QUESTION SCREEN ===== */
        .progress-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
        }

        .prog-dot {
            height: 11px;
            width: 11px;
            border-radius: 6px;
            background: #e0e0e0;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .prog-dot.current {
            width: 32px;
            background: #6c63ff;
            box-shadow: 0 3px 14px rgba(108, 99, 255, 0.55);
        }

        .prog-dot.done { background: linear-gradient(135deg, #00b894, #4ecdc4); }

        .question-num {
            font-size: 0.8rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #bbb;
            margin-bottom: 10px;
        }

        .question-text {
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            color: #2d1b69;
            line-height: 1.3;
            margin-bottom: 20px;
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* ===== 4-CHOICE BUTTONS ===== */
        .choice-wrap {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        .btn-choice {
            width: 100%;
            padding: 13px 15px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 0.97rem;
            line-height: 1.4;
            color: white;
        }

        /* A — purple */
        .btn-choice[data-choice="0"] {
            background: linear-gradient(135deg, #a29bfe, #6c63ff);
            box-shadow: 0 6px 18px rgba(108, 99, 255, 0.38);
        }
        .btn-choice[data-choice="0"]:hover {
            transform: translateY(-3px) scale(1.015);
            box-shadow: 0 12px 28px rgba(108, 99, 255, 0.55);
        }

        /* B — teal */
        .btn-choice[data-choice="1"] {
            background: linear-gradient(135deg, #55efc4, #00b894);
            box-shadow: 0 6px 18px rgba(0, 184, 148, 0.36);
        }
        .btn-choice[data-choice="1"]:hover {
            transform: translateY(-3px) scale(1.015);
            box-shadow: 0 12px 28px rgba(0, 184, 148, 0.52);
        }

        /* C — orange */
        .btn-choice[data-choice="2"] {
            background: linear-gradient(135deg, #ffc048, #e17055);
            box-shadow: 0 6px 18px rgba(225, 112, 85, 0.36);
        }
        .btn-choice[data-choice="2"]:hover {
            transform: translateY(-3px) scale(1.015);
            box-shadow: 0 12px 28px rgba(225, 112, 85, 0.52);
        }

        /* D — pink */
        .btn-choice[data-choice="3"] {
            background: linear-gradient(135deg, #fd79a8, #e84393);
            box-shadow: 0 6px 18px rgba(232, 67, 147, 0.36);
        }
        .btn-choice[data-choice="3"]:hover {
            transform: translateY(-3px) scale(1.015);
            box-shadow: 0 12px 28px rgba(232, 67, 147, 0.52);
        }

        .btn-choice:active  { transform: translateY(0) scale(0.97) !important; }
        .btn-choice:disabled { opacity: 0.55; cursor: default; transform: none !important; }

        .choice-badge {
            min-width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.28);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        /* ===== THINKING ===== */
        .thinking-spinner {
            width: 96px;
            height: 96px;
            margin: 0 auto 24px;
            background: conic-gradient(#6c63ff, #fd79a8, #ff9f43, #4ecdc4, #6c63ff);
            border-radius: 50%;
            animation: spinnerRotate 1s linear infinite;
            position: relative;
        }

        .thinking-spinner::after {
            content: '';
            position: absolute;
            inset: 10px;
            background: white;
            border-radius: 50%;
        }

        @keyframes spinnerRotate { to { transform: rotate(360deg); } }

        .thinking-title {
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: #2d1b69;
            margin-bottom: 20px;
        }

        .thinking-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .thinking-dots span {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: dotJump 0.65s ease-in-out infinite;
        }

        .thinking-dots span:nth-child(1) { background: #6c63ff;  animation-delay: 0s; }
        .thinking-dots span:nth-child(2) { background: #fd79a8;  animation-delay: 0.15s; }
        .thinking-dots span:nth-child(3) { background: #ff9f43;  animation-delay: 0.3s; }

        @keyframes dotJump {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-14px); }
        }

        .thinking-sub { font-size: 1.05rem; color: #999; font-weight: 700; }

        /* ===== RESULT ===== */
        .result-intro {
            font-size: 0.86rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ccc;
            margin-bottom: 6px;
        }

        #ageDisplay {
            font-family: 'Fredoka One', cursive;
            font-size: 9rem;
            line-height: 1;
            background: linear-gradient(135deg, #6c63ff 0%, #e84393 40%, #ff9f43 80%, #4ecdc4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 6px 0 4px;
            display: block;
            animation: ageReveal 0.75s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes ageReveal {
            0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
            60%  { transform: scale(1.18) rotate(4deg); }
            80%  { transform: scale(0.93) rotate(-2deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .age-suffix {
            font-family: 'Fredoka One', cursive;
            font-size: 1.65rem;
            color: #2d1b69;
            margin-bottom: 20px;
        }

        .fun-msg {
            background: linear-gradient(135deg, #fff3cd, #ffeaa7);
            border-radius: 16px;
            padding: 15px 20px;
            font-size: 1.05rem;
            color: #7d5200;
            font-weight: 800;
            margin-bottom: 26px;
            border: 2px solid #ffe066;
            line-height: 1.45;
        }

        .btn-again {
            background: linear-gradient(135deg, #e84393, #6c63ff);
            color: white;
            border: none;
            padding: 17px 46px;
            font-size: 1.4rem;
            font-family: 'Fredoka One', cursive;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 28px rgba(108, 99, 255, 0.45);
            transition: all 0.22s ease;
            letter-spacing: 1px;
        }

        .btn-again:hover  { transform: translateY(-5px) scale(1.02); box-shadow: 0 16px 40px rgba(108,99,255,0.55); }
        .btn-again:active { transform: translateY(0) scale(0.97); }

        /* ===== CONFETTI ===== */
        .confetti-piece {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0%   { opacity: 1; transform: translateY(0)     rotate(0deg)   scaleX(1); }
            50%  {             transform: translateY(45vh)  rotate(360deg) scaleX(-1); }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scaleX(1); }
        }
    </style>
</head>
<body>
    <div id="starfield"></div>
    <div id="floatingShapes"></div>

    <div id="gameCard">

        <!-- ============ WELCOME ============ -->
        <div class="screen active" id="welcomeScreen">
            <div class="wizard-orb">
                <div class="wizard-orb-inner">
                    <div class="star-shape"></div>
                </div>
            </div>
            <h1 class="main-title">The RoboGuesser<br>35000</h1>
            <p class="main-subtitle">
                Answer <strong>5 fun questions</strong> about<br>
                your favorite things and my super computer brain<br>
                will guess your age!
            </p>
            <button class="btn-start" onclick="startGame()">Let's Play!</button>
        </div>

        <!-- ============ QUESTION ============ -->
        <div class="screen" id="questionScreen">
            <div class="progress-wrap">
                <div class="prog-dot" id="dot0"></div>
                <div class="prog-dot" id="dot1"></div>
                <div class="prog-dot" id="dot2"></div>
                <div class="prog-dot" id="dot3"></div>
                <div class="prog-dot" id="dot4"></div>
            </div>
            <p class="question-num" id="questionNum">Question 1 of 5</p>
            <div class="question-text" id="questionText">Loading...</div>
            <div class="choice-wrap" id="choiceWrap">
                <button class="btn-choice" data-choice="0" onclick="answer(0)">
                    <span class="choice-badge">A</span>
                    <span class="choice-label"></span>
                </button>
                <button class="btn-choice" data-choice="1" onclick="answer(1)">
                    <span class="choice-badge">B</span>
                    <span class="choice-label"></span>
                </button>
                <button class="btn-choice" data-choice="2" onclick="answer(2)">
                    <span class="choice-badge">C</span>
                    <span class="choice-label"></span>
                </button>
                <button class="btn-choice" data-choice="3" onclick="answer(3)">
                    <span class="choice-badge">D</span>
                    <span class="choice-label"></span>
                </button>
            </div>
        </div>

        <!-- ============ THINKING ============ -->
        <div class="screen" id="thinkingScreen">
            <div class="thinking-spinner"></div>
            <h2 class="thinking-title">Hmm, let me think...</h2>
            <div class="thinking-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <p class="thinking-sub">The RoboGuesser is analyzing the data...</p>
        </div>

        <!-- ============ RESULT ============ -->
        <div class="screen" id="resultScreen">
            <p class="result-intro">I think you are</p>
            <span id="ageDisplay">??</span>
            <p class="age-suffix">years old!</p>
            <div class="fun-msg" id="funMsg">You are absolutely amazing!</div>
            <button class="btn-again" onclick="resetGame()">Play Again!</button>
        </div>

    </div>

    <script>
        // ===== QUESTIONS =====
        // scores[i] = points added when player picks choice i
        // Roughly: A=youngest feel, D=oldest feel
        const questions = [
            {
                text: "What is your perfect snack?",
                choices: [
                    "Gummy bears, juice box, and cream roll",
                    "Chips, pizza slices, or a fizzy drink",
                    "Coffee and avocado toast",
                    "Herbal tea and a sev mamra"
                ],
                ages: [8, 15, 35, 55]
            },
            {
                text: "Pick your favorite rainy-day activity!",
                choices: [
                    "Go out and dance in the rain or splash in puddles",
                    "Play video games or binge a fun TV show",
                    "Read a great book with some music on",
                    "A long nap, then a documentary"
                ],
                ages: [8, 16, 32, 58]
            },
            {
                text: "What is your dream weekend trip?",
                choices: [
                    "A giant theme park full of wild roller coasters",
                    "A concert with friends",
                    "A road trip stopping at great places to eat",
                    "A peaceful spa weekend or long walks in nature"
                ],
                ages: [10, 16, 35, 55]
            },
            {
                text: "What kind of music gets you going?",
                choices: [
                    "Fun cartoon themes or video game soundtracks",
                    "The latest k-pop hits everyone is talking about",
                    "Songs from the 90s and 2000s — pure nostalgia",
                    "Classic bollywood oldies"
                ],
                ages: [6, 12, 35, 58]
            },
            {
                text: "What would you do with a surprise ₹5000?",
                choices: [
                    "Loads of candy, a toy, or fun stuff at the shop",
                    "Video games, clothes, or a night out with friends",
                    "A nice dinner, a couple of good books, or save some",
                    "Put it towards bills, invest it, or donate to charity"
                ],
                ages: [8, 17, 32, 55]
            }
        ];

        const bgGradients = [
            'linear-gradient(135deg, #1a0533 0%, #0d1b2a 100%)',
            'linear-gradient(135deg, #200060 0%, #3a0078 100%)',
            'linear-gradient(135deg, #7a0030 0%, #220040 100%)',
            'linear-gradient(135deg, #003d40 0%, #001a44 100%)',
            'linear-gradient(135deg, #6a2a00 0%, #3a0050 100%)',
            'linear-gradient(135deg, #002060 0%, #400040 100%)',
            'linear-gradient(135deg, #2d1b69 0%, #11998e 100%)',
            'linear-gradient(135deg, #f6d365 0%, #fda085 50%, #f093fb 100%)'
        ];

        const funMessages = [
            { maxAge:  9, msg: "You are a super-duper kid with magic powers!" },
            { maxAge: 12, msg: "You are young and bursting with incredible energy!" },
            { maxAge: 17, msg: "You are a cool teenager ready to take on the world!" },
            { maxAge: 25, msg: "You are a young adult with the whole world ahead of you!" },
            { maxAge: 35, msg: "You are in the prime of your totally awesome life!" },
            { maxAge: 50, msg: "You are wise, wonderful, and absolutely amazing!" },
            { maxAge: 65, msg: "You are a true legend with incredible stories to tell!" },
            { maxAge: 999, msg: "You are timeless — a one-of-a-kind living legend!" }
        ];

        let currentQ    = 0;
        let chosenAges  = [];

        // ===== BACKGROUND EFFECTS =====
        function initStarfield() {
            const sf = document.getElementById('starfield');
            for (let i = 0; i < 90; i++) {
                const s     = document.createElement('div');
                s.className = 'star';
                const size  = Math.random() * 2.5 + 0.8;
                s.style.cssText = `
                    width:${size}px; height:${size}px;
                    left:${Math.random()*100}%; top:${Math.random()*100}%;
                    animation-duration:${(Math.random()*3+2).toFixed(1)}s;
                    animation-delay:${(Math.random()*4).toFixed(1)}s;
                `;
                sf.appendChild(s);
            }
        }

        function initFloatingShapes() {
            const wrap    = document.getElementById('floatingShapes');
            const palette = ['#6c63ff','#ff6b6b','#ff9f43','#4ecdc4','#fd79a8','#a29bfe','#55efc4','#ffd700'];
            for (let i = 0; i < 18; i++) {
                const el    = document.createElement('div');
                el.className = 'fshape';
                const size   = Math.random() * 60 + 18;
                const color  = palette[Math.floor(Math.random() * palette.length)];
                el.style.cssText = `
                    width:${size}px; height:${size}px;
                    left:${Math.random()*100}%;
                    bottom:-${size+10}px;
                    background:${color};
                    animation-duration:${(Math.random()*12+9).toFixed(1)}s;
                    animation-delay:${(Math.random()*10).toFixed(1)}s;
                `;
                wrap.appendChild(el);
            }
        }

        // ===== HELPERS =====
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setBg(index) {
            document.body.style.background = bgGradients[index];
        }

        // ===== GAME FLOW =====
        function startGame() {
            currentQ   = 0;
            chosenAges = [];
            renderQuestion();
            showScreen('questionScreen');
            setBg(1);
        }

        function renderQuestion() {
            const q = questions[currentQ];

            document.getElementById('questionNum').textContent = `Question ${currentQ + 1} of 5`;

            const qt = document.getElementById('questionText');
            qt.style.opacity   = '0';
            qt.style.transform = 'translateY(8px)';
            setTimeout(() => {
                qt.textContent     = q.text;
                qt.style.opacity   = '1';
                qt.style.transform = 'translateY(0)';
            }, 100);

            // Populate the 4 choice labels
            const labels = document.querySelectorAll('.choice-label');
            labels.forEach((el, i) => { el.textContent = q.choices[i]; });

            // Update progress dots
            for (let i = 0; i < 5; i++) {
                const dot = document.getElementById('dot' + i);
                dot.className = 'prog-dot';
                if      (i < currentQ)   dot.classList.add('done');
                else if (i === currentQ) dot.classList.add('current');
            }
        }

        function answer(choiceIndex) {
            document.querySelectorAll('.btn-choice').forEach(b => b.disabled = true);

            chosenAges.push(questions[currentQ].ages[choiceIndex]);
            currentQ++;

            if (currentQ < 5) {
                const qs = document.getElementById('questionScreen');
                qs.classList.remove('active');
                void qs.offsetWidth;
                qs.classList.add('active');

                renderQuestion();
                setBg(currentQ + 1);

                setTimeout(() => {
                    document.querySelectorAll('.btn-choice').forEach(b => b.disabled = false);
                }, 380);
            } else {
                showThinking();
            }
        }

        function showThinking() {
            showScreen('thinkingScreen');
            setBg(6);
            setTimeout(showResult, 2500);
        }

        function showResult() {
            const avg        = chosenAges.reduce((a, b) => a + b, 0) / chosenAges.length;
            const sparkle    = Math.floor(Math.random() * 5) - 2; // ±2 magic variance
            const guessedAge = Math.max(4, Math.min(88, Math.round(avg) + sparkle));

            document.getElementById('ageDisplay').textContent = guessedAge;

            const msgObj = funMessages.find(m => guessedAge <= m.maxAge)
                        || funMessages[funMessages.length - 1];
            document.getElementById('funMsg').textContent = msgObj.msg;

            showScreen('resultScreen');
            setBg(7);
            setTimeout(launchConfetti, 200);
        }

        function launchConfetti() {
            const palette = ['#6c63ff','#ff6b6b','#ff9f43','#4ecdc4','#fd79a8','#ffd700','#a29bfe','#00b894','#e17055'];
            const shapes  = [
                'border-radius:50%',
                'border-radius:3px',
                'border-radius:50% 0 50% 0',
                'clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)'
            ];
            for (let i = 0; i < 70; i++) {
                setTimeout(() => {
                    const p     = document.createElement('div');
                    p.className = 'confetti-piece';
                    const size  = Math.random() * 11 + 7;
                    const shape = shapes[Math.floor(Math.random() * shapes.length)];
                    const color = palette[Math.floor(Math.random() * palette.length)];
                    const dur   = (Math.random() * 2 + 2.2).toFixed(1);
                    p.style.cssText = `
                        left:${Math.random()*100}vw; top:-20px;
                        width:${size}px; height:${size}px;
                        background:${color}; ${shape};
                        animation-duration:${dur}s;
                    `;
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), parseFloat(dur) * 1000 + 500);
                }, i * 55);
            }
        }

        function resetGame() {
            setBg(0);
            showScreen('welcomeScreen');
        }

        initStarfield();
        initFloatingShapes();
    </script>
</body>
</html>
